name = "mwportal-worker"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "mwportal-db"
database_id = "e75ad089-91ee-495f-9bc4-df04361a4fc4"

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY — IMPORTANT: JWT_SECRET must NEVER be stored in [vars].
# The old JWT_SECRET that was committed to Git is now compromised.
#
# You MUST run this command to set a new secret:
#   wrangler secret put JWT_SECRET
#   (paste a strong random value when prompted)
#
# Generate one with:
#   node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
#
# ALSO: Your database_id was exposed in Git. It is not sensitive on its own
# but replace it above with your actual ID from the Cloudflare dashboard.
# ─────────────────────────────────────────────────────────────────────────────

[vars]
# Non-secret config only. Set your production frontend URL to lock down CORS:
ALLOWED_ORIGIN = "https://mwportal.pages.dev/"